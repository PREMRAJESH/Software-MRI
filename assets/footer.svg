<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 100" fill="none">
  <defs>
    <linearGradient id="lineFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4fd1e8" stop-opacity="0" />
      <stop offset="50%" stop-color="#4fd1e8" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#4fd1e8" stop-opacity="0" />
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g opacity="0.06">
    <pattern id="gridSmall" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M 12 0 L 0 0 0 12" fill="none" stroke="#4fd1e8" stroke-width="0.4"/>
    </pattern>
    <rect width="800" height="100" fill="url(#gridSmall)"/>
  </g>

  <line x1="150" y1="20" x2="650" y2="20" stroke="url(#lineFade)" stroke-width="0.5">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
  </line>

  <text x="400" y="48" font-family="Inter, sans-serif" font-size="14" text-anchor="middle" fill="#7c8a99">
    Built with
    <tspan fill="#4fd1e8"> React</tspan>
    <tspan fill="#7c8a99"> ·</tspan>
    <tspan fill="#f2a65a"> Three.js</tspan>
    <tspan fill="#7c8a99"> ·</tspan>
    <tspan fill="#4fd1e8"> Express</tspan>
    <tspan fill="#7c8a99"> ·</tspan>
    <tspan fill="#f2a65a"> TypeScript</tspan>
  </text>

  <text x="400" y="72" font-family="SF Mono, JetBrains Mono, monospace" font-size="11" text-anchor="middle" letter-spacing="0.12em" fill="#56636d">
    STATIC ANALYSIS ONLY · DATA REMAINS LOCAL
  </text>

  <circle cx="260" cy="72" r="2" fill="#4fd1e8" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="540" cy="72" r="2" fill="#4fd1e8" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>

  <g transform="translate(390, 82)" opacity="0.12">
    <rect x="0" y="0" width="2" height="5" fill="#4fd1e8">
      <animate attributeName="height" values="5;9;5" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="0;-4;0" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="4" y="-1" width="2" height="6" fill="#f2a65a">
      <animate attributeName="height" values="6;11;6" dur="1.5s" repeatCount="indefinite" begin="0.25s"/>
      <animate attributeName="y" values="-1;-6;-1" dur="1.5s" repeatCount="indefinite" begin="0.25s"/>
    </rect>
    <rect x="8" y="1" width="2" height="4" fill="#f0475c">
      <animate attributeName="height" values="4;7;4" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="y" values="1;-3;1" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
  </g>
</svg>
